<ion-content [scrollY]="true" [fullscreen]="true">
  <div class="flex min-h-screen flex-col bg-white text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100">
    <app-site-header></app-site-header>
    <main id="main" class="container-page flex flex-1 flex-col items-center justify-center py-24 text-center">
      <p class="font-mono text-sm text-zinc-500 dark:text-zinc-400">404</p>
      <h1 class="mt-3 font-display text-4xl font-semibold tracking-tight sm:text-5xl">Lost in the stream.</h1>
      <p class="mt-4 max-w-md text-zinc-600 dark:text-zinc-300">
        The page you were looking for is not here. The link may be old, or the post may have been moved.
      </p>
      <a
        routerLink="/"
        class="mt-8 inline-flex items-center justify-center rounded-full bg-zinc-900 px-6 py-3 text-sm font-medium text-white dark:bg-white dark:text-zinc-900"
      >
        Back to home
      </a>
    </main>
    <app-site-footer></app-site-footer>
  </div>
</ion-content>

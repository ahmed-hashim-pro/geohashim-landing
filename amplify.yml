version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - npm run build:web
            - node scripts/generate-sitemap.mjs
            - node scripts/copy-404.mjs
      artifacts:
        baseDirectory: www
        files:
          - '**/*'
      cache:
        paths:
          - .npm/**/*
          - node_modules/**/*
          - .angular/cache/**/*

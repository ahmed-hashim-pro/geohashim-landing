<header
  class="sticky top-0 z-40 w-full border-b border-transparent backdrop-blur-md transition-colors"
  [class.border-zinc-200]="!isDark()"
  [class.dark:border-zinc-800]="true"
  [class.bg-white]="!isDark()"
  [class.bg-opacity-70]="true"
  [class.dark:bg-zinc-950]="true"
  [class.dark:bg-opacity-70]="true"
>
  <div class="container-page flex h-16 items-center justify-between">
    <a routerLink="/" class="flex items-center gap-2 text-lg font-semibold tracking-tight" aria-label="geohashim home">
      <span class="inline-block h-6 w-6 rounded-md bg-gradient-to-br from-indigo-500 via-fuchsia-500 to-rose-500" aria-hidden="true"></span>
      <span class="font-display">{{ site.brand.wordmark }}</span>
    </a>

    <nav class="hidden md:flex items-center gap-8 text-sm" aria-label="Primary">
      @for (link of site.nav; track link.href) {
        <a
          [href]="link.href"
          class="text-zinc-600 transition-colors hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <div class="flex items-center gap-2">
      <button
        type="button"
        class="rounded-full p-2 text-zinc-600 transition-colors hover:bg-zinc-100 hover:text-zinc-900 dark:text-zinc-400 dark:hover:bg-zinc-800 dark:hover:text-zinc-100"
        [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
        (click)="toggleTheme()"
      >
        <ion-icon [name]="isDark() ? 'sunny-outline' : 'moon-outline'" aria-hidden="true"></ion-icon>
      </button>

      <a
        [href]="site.primaryCta.href"
        rel="noopener"
        target="_blank"
        class="hidden sm:inline-flex items-center gap-2 rounded-full bg-zinc-900 px-4 py-2 text-sm font-medium text-white transition-transform hover:-translate-y-px dark:bg-white dark:text-zinc-900"
      >
        {{ site.primaryCta.label }}
      </a>

      <button
        type="button"
        class="md:hidden rounded-full p-2 text-zinc-600 hover:bg-zinc-100 dark:text-zinc-400 dark:hover:bg-zinc-800"
        [attr.aria-expanded]="mobileOpen"
        aria-controls="mobile-nav"
        aria-label="Toggle navigation"
        (click)="toggleMobile()"
      >
        <ion-icon [name]="mobileOpen ? 'close-outline' : 'menu-outline'" aria-hidden="true"></ion-icon>
      </button>
    </div>
  </div>

  @if (mobileOpen) {
    <div id="mobile-nav" class="md:hidden border-t border-zinc-200 dark:border-zinc-800">
      <div class="container-page py-4 flex flex-col gap-4 text-sm">
        @for (link of site.nav; track link.href) {
          <a
            [href]="link.href"
            class="text-zinc-700 hover:text-zinc-900 dark:text-zinc-300 dark:hover:text-zinc-100"
            (click)="closeMobile()"
          >
            {{ link.label }}
          </a>
        }
        <a
          [href]="site.primaryCta.href"
          rel="noopener"
          target="_blank"
          class="inline-flex items-center justify-center rounded-full bg-zinc-900 px-4 py-2 font-medium text-white dark:bg-white dark:text-zinc-900"
        >
          {{ site.primaryCta.label }}
        </a>
      </div>
    </div>
  }
</header>

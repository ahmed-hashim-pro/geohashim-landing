<ion-content [scrollY]="true" [fullscreen]="true">
  <div class="min-h-screen bg-white text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100">
    <app-site-header></app-site-header>
    <main id="main" class="container-page py-16 sm:py-20">
      <article class="mx-auto max-w-prose">
        <p class="text-sm text-zinc-500 dark:text-zinc-400">Last updated {{ content.updated }}</p>
        <h1 class="mt-2 text-4xl font-semibold tracking-tight">Privacy Policy</h1>
        <div class="mt-10 space-y-8">
          @for (section of content.sections; track section.heading) {
            <section>
              <h2 class="text-xl font-semibold tracking-tight">{{ section.heading }}</h2>
              <p class="mt-3 text-zinc-600 dark:text-zinc-300">{{ section.body }}</p>
            </section>
          }
        </div>
      </article>
    </main>
    <app-site-footer></app-site-footer>
  </div>
</ion-content>

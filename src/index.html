<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>geohashim — a personal content stream</title>
  <meta name="description" content="My Stream is a personal social feed for sharing posts, links, and ideas — and discovering what others are streaming." />

  <base href="/" />

  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0b0d12" media="(prefers-color-scheme: dark)" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <link rel="canonical" href="https://geohashim.com/" />
  <link rel="icon" type="image/png" href="assets/icon/favicon.png" />

  <meta property="og:title" content="geohashim — a personal content stream" />
  <meta property="og:description" content="My Stream is a personal social feed for sharing posts, links, and ideas — and discovering what others are streaming." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://geohashim.com/" />
  <meta property="og:site_name" content="geohashim" />
  <meta property="og:image" content="https://geohashim.com/assets/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="geohashim — a personal content stream" />
  <meta name="twitter:description" content="My Stream is a personal social feed for sharing posts, links, and ideas — and discovering what others are streaming." />
  <meta name="twitter:image" content="https://geohashim.com/assets/og-image.png" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" />

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('geohashim:theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored === 'dark' || ((stored === 'system' || !stored) && prefersDark);
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.classList.add('ion-palette-dark');
        }
      } catch (e) {}
    })();
  </script>

</head>

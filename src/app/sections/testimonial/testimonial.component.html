<section class="container-page py-20 sm:py-24">
  <figure class="surface-card mx-auto max-w-3xl p-8 sm:p-12 text-center">
    <blockquote class="font-display text-2xl leading-snug text-zinc-900 sm:text-3xl dark:text-zinc-50">
      &ldquo;{{ t.quote }}&rdquo;
    </blockquote>
    <figcaption class="mt-6 flex items-center justify-center gap-3 text-sm text-zinc-600 dark:text-zinc-300">
      <span class="inline-flex h-9 w-9 items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-fuchsia-500 text-xs font-semibold text-white">
        {{ t.initials }}
      </span>
      <span>
        <span class="font-medium text-zinc-900 dark:text-zinc-100">{{ t.name }}</span>
        <span class="text-zinc-500 dark:text-zinc-400"> · {{ t.role }}</span>
      </span>
    </figcaption>
  </figure>
</section>

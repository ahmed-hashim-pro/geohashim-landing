<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="geohashim — Ahmed Hashim · AI tools, web, and mobile apps">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d12"/>
      <stop offset="100%" stop-color="#1a1d24"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g transform="translate(72, 72)">
    <rect width="48" height="48" rx="12" fill="url(#brand)"/>
    <text x="24" y="33" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Inter, sans-serif" font-weight="700" font-size="28" fill="#ffffff" letter-spacing="-1">g</text>
    <text x="64" y="32" font-family="ui-sans-serif, system-ui, -apple-system, Inter, sans-serif" font-weight="600" font-size="22" fill="#e5e7eb">geohashim</text>
  </g>

  <g transform="translate(72, 180)">
    <text font-family="'Space Grotesk', ui-sans-serif, Inter, sans-serif" font-weight="700" font-size="64" fill="#ffffff" letter-spacing="-2">
      <tspan x="0" y="0">I'm Ahmed Hashim.</tspan>
      <tspan x="0" y="80" fill="url(#brand)">I build AI tools and apps</tspan>
      <tspan x="0" y="160" fill="#ffffff">that ship.</tspan>
    </text>
  </g>

  <g transform="translate(72, 470)">
    <g transform="translate(0, 0)">
      <rect width="320" height="100" rx="16" fill="#1a1d24" stroke="#2a2d34"/>
      <rect x="16" y="20" width="44" height="44" rx="10" fill="url(#card1)"/>
      <text x="76" y="45" font-family="ui-sans-serif, Inter, sans-serif" font-weight="600" font-size="18" fill="#ffffff">My Stream</text>
      <text x="76" y="68" font-family="ui-sans-serif, Inter, sans-serif" font-size="14" fill="#a1a1aa">AI publishing platform</text>
    </g>
    <g transform="translate(348, 0)">
      <rect width="320" height="100" rx="16" fill="#1a1d24" stroke="#2a2d34"/>
      <rect x="16" y="20" width="44" height="44" rx="10" fill="url(#card2)"/>
      <text x="76" y="45" font-family="ui-sans-serif, Inter, sans-serif" font-weight="600" font-size="18" fill="#ffffff">Mushaf</text>
      <text x="76" y="68" font-family="ui-sans-serif, Inter, sans-serif" font-size="14" fill="#a1a1aa">Digital Quran reader</text>
    </g>
    <g transform="translate(696, 0)">
      <rect width="320" height="100" rx="16" fill="#1a1d24" stroke="#2a2d34"/>
      <rect x="16" y="20" width="44" height="44" rx="10" fill="url(#card3)"/>
      <text x="76" y="45" font-family="ui-sans-serif, Inter, sans-serif" font-weight="600" font-size="18" fill="#ffffff">Online Quran</text>
      <text x="76" y="68" font-family="ui-sans-serif, Inter, sans-serif" font-size="14" fill="#a1a1aa">Android app</text>
    </g>
  </g>

  <text x="1128" y="608" text-anchor="end" font-family="ui-sans-serif, Inter, sans-serif" font-size="14" fill="#71717a">geohashim.com</text>

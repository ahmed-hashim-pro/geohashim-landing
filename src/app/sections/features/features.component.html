<section id="features" class="container-page py-20 sm:py-28 scroll-mt-20">
  <div class="mx-auto max-w-3xl text-center">
    <h2 class="text-3xl font-semibold tracking-tight text-zinc-900 sm:text-4xl dark:text-zinc-50">
      {{ content.heading }}
    </h2>
    <p class="mt-4 text-lg text-zinc-600 dark:text-zinc-300">{{ content.subhead }}</p>
  </div>

  <ul class="mt-14 grid gap-6 sm:grid-cols-2 lg:grid-cols-3" role="list">
    @for (feature of content.items; track feature.title) {
      <li>
        <ion-card class="m-0 h-full rounded-2xl border border-zinc-200 bg-white p-0 shadow-none dark:border-zinc-800 dark:bg-zinc-900">
          <ion-card-content class="flex h-full flex-col gap-3 p-6">
            <span class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-indigo-500 to-fuchsia-500 text-white">
              <ion-icon [name]="feature.icon" aria-hidden="true" class="text-xl"></ion-icon>
            </span>
            <h3 class="text-lg font-semibold text-zinc-900 dark:text-zinc-50">{{ feature.title }}</h3>
            <p class="text-sm text-zinc-600 dark:text-zinc-300">{{ feature.body }}</p>
          </ion-card-content>
        </ion-card>
      </li>
    }
  </ul>
</section>

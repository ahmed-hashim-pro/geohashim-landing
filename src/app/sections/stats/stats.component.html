<section class="container-page -mt-6 sm:-mt-10">
  <div class="surface-card grid grid-cols-2 gap-6 px-6 py-6 text-center sm:grid-cols-4 sm:px-10">
    @for (stat of stats; track stat.label) {
      <div class="flex flex-col gap-1">
        <span class="font-display text-2xl font-semibold tracking-tight text-zinc-900 sm:text-3xl dark:text-zinc-50">
          {{ stat.value }}
        </span>
        <span class="text-xs font-medium uppercase tracking-wider text-zinc-500 dark:text-zinc-400">
          {{ stat.label }}
        </span>
      </div>
    }
  </div>
</section>
